# ============================================================
# alert-service - Spring Cloud Netflix Eureka Client
# ============================================================

# Desactiva el verificador de compatibilidad de Spring Cloud
spring.cloud.compatibility-verifier.enabled=false

# Spring Cloud Netflix Eureka - Service Discovery
# Los microservicios se registran en Eureka para ser descubiertos dinamicamente
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# RabbitMQ - Message Broker para recibir alertas de los sensores via AMQP
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Spring Data JPA - Persistencia de alertas en base de datos H2 (en memoria)
# Demuestra: @Transactional, Connection Pooling (HikariCP), Spring Data JDBC/JPA
spring.datasource.url=jdbc:h2:mem:alertdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

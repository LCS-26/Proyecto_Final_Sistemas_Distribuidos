# ============================================================
# Eureka Server - Spring Cloud Netflix
# ============================================================

# Desactiva el verificador de compatibilidad de Spring Cloud
# (necesario si la version de Spring Boot no esta en la lista de versiones conocidas)
spring.cloud.compatibility-verifier.enabled=false

server.port=8761
spring.application.name=eureka-server

# El servidor Eureka no se registra a si mismo en el registry
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# URL del propio servidor para que los clientes puedan conectarse
eureka.client.service-url.defaultZone=http://${eureka.instance.hostname}:${server.port}/eureka/

# Reducir tiempo de espera en arranque
eureka.server.wait-time-in-ms-when-sync-empty=0

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
